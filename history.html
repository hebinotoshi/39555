<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>歴史クイズ — 室町時代</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap');

  :root {
    --bg: #0a0a1a;
    --panel: #12122a;
    --panel2: #1a1a3a;
    --border: #3a3a7a;
    --accent: #ffaa00;
    --accent2: #ff4488;
    --accent3: #ffdd00;
    --accent4: #00ffcc;
    --text: #e0e0ff;
    --text-dim: #7070aa;
    --correct: #00ffcc;
    --wrong: #ff4488;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'M PLUS Rounded 1c', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    padding-bottom: 60px;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
    pointer-events: none;
    z-index: 1000;
  }

  .container {
    width: 100%;
    max-width: 680px;
    padding: 0 16px;
    position: relative;
    z-index: 1;
  }

  .back-bar { padding: 14px 0 0; }
  .back-link { font-family: 'Press Start 2P', monospace; font-size: 8px; color: var(--text-dim); text-decoration: none; letter-spacing: 1px; transition: color 0.15s; }
  .back-link:hover { color: var(--accent); }

  .title-block { text-align: center; padding: 18px 0 22px; animation: titlePulse 2s ease-in-out infinite alternate; }
  @keyframes titlePulse {
    from { text-shadow: 0 0 10px var(--accent); }
    to   { text-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent); }
  }
  .title-jp { font-family: 'Press Start 2P', monospace; font-size: clamp(11px,3.5vw,16px); color: var(--accent); line-height: 1.8; }
  .title-en { font-family: 'Press Start 2P', monospace; font-size: clamp(7px,2vw,9px); color: var(--text-dim); letter-spacing: 3px; margin-top: 4px; }

  .badge {
    display: inline-block;
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: var(--accent3);
    background: rgba(255,221,0,0.07);
    border: 1px solid rgba(255,221,0,0.3);
    border-radius: 4px;
    padding: 5px 14px;
    margin-bottom: 20px;
    letter-spacing: 1px;
  }

  /* SECTION TABS */
  .section-tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
  .stab {
    padding: 7px 12px;
    border: 1.5px solid var(--border);
    border-radius: 99px;
    font-size: 12px;
    background: var(--panel2);
    color: var(--text-dim);
    cursor: pointer;
    font-family: 'M PLUS Rounded 1c', sans-serif;
    font-weight: 700;
    transition: all .12s;
  }
  .stab:hover { border-color: var(--accent); color: var(--text); }
  .stab.active { background: var(--accent); color: #000; border-color: var(--accent); }
  .stab.done { border-color: rgba(0,255,204,0.4); color: var(--accent4); }
  .stab.done.active { background: var(--accent); color: #000; }

  /* PROGRESS */
  .prog-row { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
  .prog-bar { flex: 1; height: 5px; background: var(--panel2); border: 1px solid var(--border); border-radius: 99px; overflow: hidden; }
  .prog-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.4s; }
  .prog-label { font-family: 'Press Start 2P', monospace; font-size: 7px; color: var(--text-dim); white-space: nowrap; }

  /* QUESTION BLOCK */
  .qblock { margin-bottom: 28px; }
  .qnum { font-family: 'Press Start 2P', monospace; font-size: 8px; color: var(--text-dim); margin-bottom: 10px; letter-spacing: 1px; }
  .qtext {
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.7;
    margin-bottom: 14px;
    padding: 14px 16px;
    background: var(--panel);
    border: 2px solid var(--border);
    border-radius: 4px;
    border-left: 4px solid var(--accent);
  }

  /* ANSWER AREA */
  .ans-wrap { display: flex; gap: 8px; margin-bottom: 10px; }
  .ans-input {
    flex: 1;
    background: var(--panel2);
    border: 2px solid var(--border);
    color: var(--text);
    padding: 12px 16px;
    border-radius: 4px;
    font-family: 'M PLUS Rounded 1c', sans-serif;
    font-size: 16px;
    font-weight: 700;
    outline: none;
    transition: border-color 0.15s;
  }
  .ans-input:focus { border-color: var(--accent); }
  .ans-input.correct { border-color: var(--correct); background: rgba(0,255,204,0.06); color: var(--correct); }
  .ans-input.wrong { border-color: var(--wrong); background: rgba(255,68,136,0.06); }
  .ans-input:disabled { opacity: 0.8; cursor: default; }

  .check-btn {
    background: var(--accent); color: #000;
    border: none; padding: 12px 18px;
    font-family: 'Press Start 2P', monospace; font-size: 8px;
    cursor: pointer; border-radius: 4px;
    transition: all 0.12s; white-space: nowrap;
    box-shadow: 0 3px 0 rgba(180,100,0,0.4);
  }
  .check-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 5px 0 rgba(180,100,0,0.4); }
  .check-btn:disabled { opacity: 0.4; cursor: default; transform: none; }

  .feedback {
    font-size: 13px;
    line-height: 1.6;
    padding: 10px 14px;
    border-radius: 4px;
    margin-bottom: 8px;
    display: none;
  }
  .feedback.ok { display: block; background: rgba(0,255,204,0.08); color: var(--correct); border: 1px solid rgba(0,255,204,0.3); }
  .feedback.ng { display: block; background: rgba(255,68,136,0.08); color: var(--wrong); border: 1px solid rgba(255,68,136,0.3); }

  .hint-btn {
    background: transparent;
    border: 1.5px solid var(--text-dim);
    color: var(--text-dim);
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 11px;
    cursor: pointer;
    font-family: 'M PLUS Rounded 1c', sans-serif;
    transition: all 0.12s;
    margin-top: 4px;
  }
  .hint-btn:hover { border-color: var(--accent3); color: var(--accent3); }
  .hint-text { font-size: 12px; color: var(--accent3); margin-top: 6px; display: none; padding: 6px 10px; background: rgba(255,221,0,0.06); border-radius: 4px; border: 1px solid rgba(255,221,0,0.2); }
  .hint-text.visible { display: block; }

  .divider { border: none; border-top: 1px solid var(--border); margin: 22px 0; }

  /* SCORE AREA */
  .score-bar { display: flex; justify-content: center; gap: 12px; margin-bottom: 22px; flex-wrap: wrap; }
  .score-pill { font-family: 'Press Start 2P', monospace; font-size: 7px; padding: 6px 12px; border-radius: 99px; border: 1px solid var(--border); background: var(--panel2); }
  .score-pill.cor { color: var(--correct); border-color: rgba(0,255,204,0.3); }
  .score-pill.wrn { color: var(--wrong); border-color: rgba(255,68,136,0.3); }
  .score-pill.tot { color: var(--text-dim); }

  /* RESULT */
  .result-wrap { text-align: center; padding: 20px 0; }
  .result-emoji { font-size: 72px; display: block; margin-bottom: 12px; animation: bounce 0.5s; }
  @keyframes bounce { 0%{transform:scale(0)} 60%{transform:scale(1.2)} 100%{transform:scale(1)} }
  .result-title { font-family: 'Press Start 2P', monospace; font-size: clamp(10px,3vw,14px); color: var(--accent); margin-bottom: 8px; line-height: 1.8; }
  .result-sub { font-size: 13px; color: var(--text-dim); margin-bottom: 20px; }
  .result-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 16px 0; }
  .r-stat { background: var(--panel2); border: 1px solid var(--border); border-radius: 4px; padding: 12px; text-align: center; }
  .r-val { font-family: 'Press Start 2P', monospace; font-size: 20px; display: block; margin-bottom: 4px; }
  .r-label { font-size: 10px; color: var(--text-dim); }

  .missed-block { background: var(--panel2); border: 1px solid var(--border); border-radius: 4px; padding: 14px; margin: 14px 0; max-height: 300px; overflow-y: auto; text-align: left; }
  .missed-title { font-family: 'Press Start 2P', monospace; font-size: 7px; color: var(--wrong); margin-bottom: 10px; }
  .missed-row { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }
  .missed-row:last-child { border-bottom: none; }
  .missed-q { color: var(--text-dim); font-size: 12px; margin-bottom: 3px; }
  .missed-a { color: var(--correct); font-weight: 700; }

  .btn-primary { display:block;width:100%;background:var(--accent);color:#000;border:none;padding:14px;font-family:'Press Start 2P',monospace;font-size:10px;cursor:pointer;border-radius:4px;margin-bottom:10px;transition:all 0.15s;box-shadow:0 4px 0 rgba(180,100,0,0.4); }
  .btn-primary:hover { transform:translateY(-2px); }
  .btn-secondary { display:block;width:100%;background:transparent;color:var(--text-dim);border:2px solid var(--border);padding:12px;font-family:'Press Start 2P',monospace;font-size:9px;cursor:pointer;border-radius:4px;margin-bottom:10px;transition:all 0.15s; }
  .btn-secondary:hover { border-color:var(--text-dim);color:var(--text); }

  .screen { display: none; }
  .screen.active { display: block; }
</style>
</head>
<body>
<div class="container">
  <div class="back-bar">
    <a class="back-link" href="index.html">◀ トップへ戻る</a>
  </div>

  <div class="title-block">
    <div class="title-jp">📜 歴史クイズ</div>
    <div class="title-en">HISTORY QUIZ — MUROMACHI ERA</div>
  </div>

  <!-- SECTION SELECT -->
  <div class="screen active" id="menuScreen">
    <div style="text-align:center;margin-bottom:20px">
      <div class="badge">室町時代 · 35問</div>
    </div>

    <div style="background:var(--panel);border:2px solid var(--border);border-radius:4px;padding:20px;margin-bottom:16px;">
      <div style="font-family:'Press Start 2P',monospace;font-size:8px;color:var(--accent3);letter-spacing:2px;margin-bottom:16px;">📚 セクションを選ぶ</div>

      <button class="stab" style="width:100%;border-radius:4px;padding:14px 16px;text-align:left;margin-bottom:10px;font-size:13px" onclick="startQuiz('all')">
        🗾 全問チャレンジ（35問）
      </button>
      <button class="stab" style="width:100%;border-radius:4px;padding:14px 16px;text-align:left;margin-bottom:10px;font-size:13px" onclick="startQuiz('5')">
        ⑤ 琉球・アイヌ・東アジアの交流（問1〜9）
      </button>
      <button class="stab" style="width:100%;border-radius:4px;padding:14px 16px;text-align:left;margin-bottom:10px;font-size:13px" onclick="startQuiz('6')">
        ⑥ 室町時代の産業・農村・都市（問10〜18）
      </button>
      <button class="stab" style="width:100%;border-radius:4px;padding:14px 16px;text-align:left;margin-bottom:10px;font-size:13px" onclick="startQuiz('7')">
        ⑦ 戦国大名の登場（問19〜27）
      </button>
      <button class="stab" style="width:100%;border-radius:4px;padding:14px 16px;text-align:left;font-size:13px" onclick="startQuiz('8')">
        ⑧ 室町文化とその広がり（問28〜35）
      </button>
    </div>
  </div>

  <!-- QUIZ SCREEN -->
  <div class="screen" id="quizScreen">
    <div class="badge" id="quizBadge">全35問</div>
    <div class="score-bar">
      <div class="score-pill cor" id="scoreCorrect">✓ 0</div>
      <div class="score-pill wrn" id="scoreWrong">✗ 0</div>
      <div class="score-pill tot" id="scoreTotal">/ 0</div>
    </div>
    <div class="prog-row">
      <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
      <div class="prog-label" id="progLabel">0 / 0</div>
    </div>
    <div id="questionsArea"></div>
    <button class="btn-primary" id="finishBtn" onclick="showResult()" style="display:none">📊 結果を見る</button>
    <button class="btn-secondary" onclick="goMenu()">← セクション選択へ戻る</button>
  </div>

  <!-- RESULT SCREEN -->
  <div class="screen" id="resultScreen">
    <div class="result-wrap">
      <span class="result-emoji" id="resultEmoji">🏆</span>
      <div class="result-title" id="resultTitle">—</div>
      <div class="result-sub" id="resultSub">—</div>
      <div class="result-stats">
        <div class="r-stat"><span class="r-val" id="rCorrect" style="color:var(--correct)">0</span><div class="r-label">正解</div></div>
        <div class="r-stat"><span class="r-val" id="rWrong" style="color:var(--wrong)">0</span><div class="r-label">不正解</div></div>
        <div class="r-stat"><span class="r-val" id="rPct" style="color:var(--accent)">0%</span><div class="r-label">正答率</div></div>
      </div>
      <div id="missedBlock" style="display:none">
        <div class="missed-block">
          <div class="missed-title">❌ 間違えた問題</div>
          <div id="missedList"></div>
        </div>
      </div>
      <button class="btn-primary" onclick="retryQuiz()">🔄 もう一度！</button>
      <button class="btn-secondary" onclick="goMenu()">← セクション選択へ</button>
    </div>
  </div>

</div>

<script>
const ALL_QUESTIONS = [
  // ── セクション5：琉球・アイヌ・東アジアの交流 ──
  {
    sec: '5',
    q: '琉球（現在の沖縄県）では、何世紀ごろから城（グスク）を根拠地にした豪族が現れましたか？',
    a: '14世紀',
    hint: '農耕が始まったのは12世紀、その後に豪族が現れた。'
  },
  {
    sec: '5',
    q: '15世紀に中山の王となった人物の名前は何ですか？',
    a: '尚氏（しょうし）',
    hint: '山北・山南を統一して琉球王国をつくった。'
  },
  {
    sec: '5',
    q: '琉球王国が行っていた、各地との物資のやりとりを何といいますか？',
    a: '中継貿易',
    hint: '日本・中国・朝鮮・東南アジアとの交流で栄えた。'
  },
  {
    sec: '5',
    q: '琉球王国の首都（首里）に建てられた城の名前を答えなさい。',
    a: '首里城（しゅりじょう）',
    hint: '現在の沖縄県に世界遺産として残っている。'
  },
  {
    sec: '5',
    q: '北海道（蝦夷地）に住んでいた人々を何といいますか？',
    a: 'アイヌ（民族）',
    hint: '和人との交易を通じて交流した。'
  },
  {
    sec: '5',
    q: 'アイヌの人々が和人（本州の人々）と交易していた場所を何といいますか？',
    a: '館（たて）',
    hint: '道南地方の12の館が有名。'
  },
  {
    sec: '5',
    q: '14世紀、中国で漢民族が建てた国の名前は何ですか？',
    a: '明（みん）',
    hint: 'モンゴル民族を北に退けて成立した。'
  },
  {
    sec: '5',
    q: '15世紀ごろ、西日本の武士・商人・漁民の中に現れた、外国の沿岸をあらした集団を何といいますか？',
    a: '倭寇（わこう）',
    hint: '明はこれをおさえるため、外国との貿易を管理した。'
  },
  {
    sec: '5',
    q: '15世紀に大きな交易拠点となった「志閣」の近くで発掘された大量のものは何ですか？',
    a: '宋銭（そうせん）',
    hint: '活発な交易の証拠となった。'
  },

  // ── セクション6：室町時代の産業・農村・都市 ──
  {
    sec: '6',
    q: '室町時代、農村では有力な農民を中心にどのような自治組織がつくられましたか？',
    a: '惣（そう）',
    hint: '農業用水路の建設・管理や、村のおきてを定めた。'
  },
  {
    sec: '6',
    q: '室町時代の農村で、農民が領主に対して年貢の軽減などを求めて起こした動きを何といいますか？',
    a: '土一揆（つちいっき）',
    hint: '15世紀になると近畿地方を中心に広がった。'
  },
  {
    sec: '6',
    q: '室町時代、各地の港や寺社の門前で発達したものは何ですか？',
    a: '都市（まち）',
    hint: '商工業者が集まり、町人と呼ばれる人々が生活した。'
  },
  {
    sec: '6',
    q: '室町時代に各地で開かれるようになった市を何といいますか？',
    a: '定期市（ていきいち）',
    hint: '月に数回開かれ、多くの品物が取引された。'
  },
  {
    sec: '6',
    q: '京都では、町家・町人と呼ばれる住民たちがどのようなことを守りましたか？',
    a: '地域の安全（自治）',
    hint: '祇園祭も盛大に行われた。'
  },
  {
    sec: '6',
    q: '明や朝鮮との貿易で栄えた博多（福岡）や堺（大阪府）でも行われていたことは何ですか？',
    a: '自治',
    hint: '商人たちが中心となって運営した。'
  },
  {
    sec: '6',
    q: '室町時代、商人や職人が同業者どうしで結成した組合を何といいますか？',
    a: '座（ざ）',
    hint: '貴族や寺社にお金などで税を納め、販売を独占する権利を得た。'
  },
  {
    sec: '6',
    q: '室町時代に盛んになった、馬を使って荷物を運ぶ業者を何といいますか？',
    a: '馬借（ばしゃく）',
    hint: '牛車を使う車借（しゃしゃく）もいた。'
  },
  {
    sec: '6',
    q: '室町時代、土倉（どそう）や酒屋などをおそい、借金の帳消しを求めた動きを何といいますか？',
    a: '土一揆（つちいっき）',
    hint: '惣の団結が強まり、武装した農民が行動した。'
  },

  // ── セクション7：戦国大名の登場 ──
  {
    sec: '7',
    q: '応仁の乱の後、守護大名にかわって力をつけた新しい支配者を何といいますか？',
    a: '戦国大名（せんごくだいみょう）',
    hint: '家来が主人に打ち勝つ「下剋上」の時代に登場した。'
  },
  {
    sec: '7',
    q: '戦国大名が家来や民衆を取りしまるために定めた独自の法令を何といいますか？',
    a: '分国法（ぶんこくほう）',
    hint: '今川氏の「今川仮名目録」などが有名。'
  },
  {
    sec: '7',
    q: '戦国大名が、それまで山に築いていた城を移した場所はどこですか？',
    a: '平地（交通に便利な場所）',
    hint: '城の周辺に家来や商工業者を集めた。'
  },
  {
    sec: '7',
    q: '戦国大名が城の周辺に家来・商工業者を集めてつくった都市を何といいますか？',
    a: '城下町（じょうかまち）',
    hint: '交通の要所に造られた。'
  },
  {
    sec: '7',
    q: '加賀（現在の石川県）で、守護大名をたおして約100年にわたり自治を行った宗教勢力は何ですか？',
    a: '浄土真宗（一向宗）の信者（一向一揆）',
    hint: '一向一揆とも呼ばれる。'
  },
  {
    sec: '7',
    q: '戦国大名が盛んに行った産業開発のひとつ、石見銀山（島根県）はどの国に大量の銀を輸出しましたか？',
    a: '中国（明）',
    hint: '世界に流通し、世界の経済に影響をあたえた。'
  },
  {
    sec: '7',
    q: '石見銀山の開発を行った博多（福岡市）の人々は何者でしたか？',
    a: '商人',
    hint: '戦国大名の保護を受けて開発した。'
  },
  {
    sec: '7',
    q: '戦国時代に「家来が主人に打ち勝つ」世の中の風潮を何といいますか？',
    a: '下剋上（げこくじょう）',
    hint: '身分が下の者が上の者に勝つという意味。'
  },
  {
    sec: '7',
    q: '戦国大名は農業を発展させるために何を建設しましたか？',
    a: '大規模な用水路',
    hint: '農業の生産力を高めるための水の管理。'
  },

  // ── セクション8：室町文化とその広がり ──
  {
    sec: '8',
    q: '足利義満が京都の北山に建てた建物の名前を答えなさい。',
    a: '金閣（きんかく）',
    hint: '北山文化を代表する建築物。'
  },
  {
    sec: '8',
    q: '足利義政が京都の東山に建てた建物の名前を答えなさい。',
    a: '銀閣（ぎんかく）',
    hint: '東山文化を代表する建築物。'
  },
  {
    sec: '8',
    q: '室町時代に発達した、墨一色で自然を表現する絵画を何といいますか？',
    a: '水墨画（すいぼくが）',
    hint: '禅宗の影響を受けた絵画。'
  },
  {
    sec: '8',
    q: '明に渡って水墨画を学び、帰国後に日本の風景をえがいた優れた作品を残した僧は誰ですか？',
    a: '雪舟（せっしゅう）',
    hint: '禅宗の僧であり、日本水墨画の大成者。'
  },
  {
    sec: '8',
    q: '室町時代の庭園に用いられた、枯山水とはどのような庭園ですか？',
    a: '石や砂で水の流れを表現した庭園',
    hint: '龍安寺の石庭が有名。'
  },
  {
    sec: '8',
    q: '室町時代に民衆の間に広がった舞台芸能で、能の合間に演じられた喜劇を何といいますか？',
    a: '狂言（きょうげん）',
    hint: '民衆の生活や感情をよく表した。'
  },
  {
    sec: '8',
    q: '足利義満のころ、武家文化と公家文化が融合して生まれた文化を何文化といいますか？',
    a: '北山文化（きたやまぶんか）',
    hint: '金閣にその特色が表れている。'
  },
  {
    sec: '8',
    q: '室町時代、仮装をして踊る民衆の芸能を何といいますか？',
    a: '風流おどり（ふりゅうおどり）',
    hint: '各地の農村の祭りでも楽しまれた。'
  },
];

let currentSection = 'all';
let currentQs = [];
let state = {};

function startQuiz(sec) {
  currentSection = sec;
  currentQs = sec === 'all' ? ALL_QUESTIONS : ALL_QUESTIONS.filter(q => q.sec === sec);
  state = {
    answers: {},
    hints: {},
    correct: 0,
    wrong: 0,
    missed: [],
    finished: false,
  };

  const badges = { all: '全35問', '5': 'セクション⑤（9問）', '6': 'セクション⑥（9問）', '7': 'セクション⑦（9問）', '8': 'セクション⑧（8問）' };
  document.getElementById('quizBadge').textContent = badges[sec] || '';

  showScreen('quizScreen');
  renderQuestions();
}

function renderQuestions() {
  const area = document.getElementById('questionsArea');
  let html = '';

  currentQs.forEach((q, i) => {
    const d = state.answers[i];
    html += `
      <div class="qblock" id="qblock${i}">
        <div class="qnum">問 ${i + 1} / ${currentQs.length}</div>
        <div class="qtext">${q.q}</div>
        <div class="ans-wrap">
          <input class="ans-input" id="input${i}" type="text" placeholder="答えを書いてください…"
            autocomplete="off" autocorrect="off" spellcheck="false"
            onkeydown="handleKey(event,${i})"
            ${d ? 'disabled' : ''}>
          <button class="check-btn" id="checkBtn${i}" onclick="checkAnswer(${i})" ${d ? 'disabled' : ''}>確認</button>
        </div>
        <div class="feedback" id="fb${i}"></div>
        <button class="hint-btn" id="hintBtn${i}" onclick="showHint(${i})">💡 ヒントを見る</button>
        <div class="hint-text" id="hint${i}">${q.hint}</div>
      </div>
      ${i < currentQs.length - 1 ? '<hr class="divider">' : ''}`;
  });

  area.innerHTML = html;
  updateProgress();
}

function handleKey(e, i) {
  if (e.key === 'Enter') checkAnswer(i);
}

function checkAnswer(i) {
  const q = currentQs[i];
  if (state.answers[i]) return;

  const input = document.getElementById(`input${i}`);
  const given = input.value.trim();
  if (!given) return;

  // Normalize: remove spaces, brackets, furigana hints in （）for comparison
  const normalize = s => s.replace(/（[^）]*）/g, '').replace(/[　 \s]/g, '').toLowerCase();
  const isOk = normalize(given) === normalize(q.a) ||
               given.trim() === q.a.trim() ||
               // also accept if the given answer contains the key term
               normalize(q.a).includes(normalize(given)) && normalize(given).length >= 2;

  state.answers[i] = { given, ok: isOk };

  input.disabled = true;
  document.getElementById(`checkBtn${i}`).disabled = true;

  const fb = document.getElementById(`fb${i}`);
  if (isOk) {
    input.classList.add('correct');
    fb.className = 'feedback ok';
    fb.textContent = `✓ 正解！ 答え：${q.a}`;
    state.correct++;
  } else {
    input.classList.add('wrong');
    fb.className = 'feedback ng';
    fb.textContent = `✗ 不正解。正しい答えは「${q.a}」`;
    state.wrong++;
    state.missed.push({ q: q.q, a: q.a });
  }

  updateProgress();

  // Check if all answered
  if (Object.keys(state.answers).length === currentQs.length) {
    document.getElementById('finishBtn').style.display = 'block';
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  }

  // Auto-focus next unanswered
  for (let j = i + 1; j < currentQs.length; j++) {
    if (!state.answers[j]) {
      setTimeout(() => {
        const next = document.getElementById(`input${j}`);
        if (next) { next.focus(); next.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
      }, 200);
      break;
    }
  }
}

function showHint(i) {
  const hint = document.getElementById(`hint${i}`);
  const btn = document.getElementById(`hintBtn${i}`);
  hint.classList.add('visible');
  btn.style.display = 'none';
}

function updateProgress() {
  const answered = Object.keys(state.answers).length;
  const total = currentQs.length;
  const pct = Math.round(answered / total * 100);
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progLabel').textContent = `${answered} / ${total}`;
  document.getElementById('scoreCorrect').textContent = `✓ ${state.correct}`;
  document.getElementById('scoreWrong').textContent = `✗ ${state.wrong}`;
  document.getElementById('scoreTotal').textContent = `/ ${total}`;
}

function showResult() {
  const total = currentQs.length;
  const pct = Math.round(state.correct / total * 100);
  let emoji, title;
  if (pct === 100)    { emoji = '🌟'; title = '満点！素晴らしい！'; }
  else if (pct >= 80) { emoji = '🏆'; title = 'よくできました！'; }
  else if (pct >= 60) { emoji = '📖'; title = 'もう少し！'; }
  else                { emoji = '😓'; title = '要復習！もう一度チャレンジしよう'; }

  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultSub').textContent = `正答率 ${pct}%`;
  document.getElementById('rCorrect').textContent = state.correct;
  document.getElementById('rWrong').textContent = state.wrong;
  document.getElementById('rPct').textContent = pct + '%';

  if (state.missed.length > 0) {
    document.getElementById('missedBlock').style.display = 'block';
    document.getElementById('missedList').innerHTML = state.missed.map(m =>
      `<div class="missed-row"><div class="missed-q">${m.q}</div><div class="missed-a">→ ${m.a}</div></div>`
    ).join('');
  } else {
    document.getElementById('missedBlock').style.display = 'none';
  }

  showScreen('resultScreen');
}

function retryQuiz() { startQuiz(currentSection); }
function goMenu() { showScreen('menuScreen'); }
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}
</script>
