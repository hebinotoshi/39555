<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Portal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap');

  :root {
    --bg: #0a0a1a;
    --panel: #12122a;
    --panel2: #1a1a3a;
    --border: #3a3a7a;
    --accent: #00ffcc;
    --accent2: #ff4488;
    --accent3: #ffdd00;
    --text: #e0e0ff;
    --text-dim: #7070aa;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'M PLUS Rounded 1c', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    padding: 24px 16px;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
    pointer-events: none;
    z-index: 100;
  }

  .container {
    width: 100%;
    max-width: 480px;
    position: relative;
    z-index: 1;
  }

  /* Title */
  .title-block {
    text-align: center;
    margin-bottom: 40px;
  }
  .title-icon {
    font-size: 48px;
    display: block;
    margin-bottom: 16px;
    animation: iconFloat 3s ease-in-out infinite;
    filter: drop-shadow(0 0 14px rgba(0,255,204,0.5));
  }
  @keyframes iconFloat {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  .title-main {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(11px, 3.5vw, 16px);
    color: var(--accent);
    line-height: 1.8;
    letter-spacing: 2px;
    animation: titlePulse 2s ease-in-out infinite alternate;
  }
  @keyframes titlePulse {
    from { text-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent); }
    to   { text-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent); }
  }
  .title-sub {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(7px, 2vw, 9px);
    color: var(--text-dim);
    letter-spacing: 3px;
    margin-top: 8px;
  }

  /* Select label */
  .select-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: var(--accent3);
    text-align: center;
    letter-spacing: 2px;
    margin-bottom: 20px;
  }

  /* Quiz cards */
  .quiz-card {
    display: block;
    width: 100%;
    background: var(--panel);
    border: 2px solid var(--border);
    border-radius: 4px;
    padding: 22px 20px;
    margin-bottom: 14px;
    text-decoration: none;
    color: var(--text);
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }
  .quiz-card::before {
    content: '';
    position: absolute;
    top: 0; left: -100%; right: 0; bottom: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
    transition: left 0.4s;
  }
  .quiz-card:hover::before { left: 100%; }
  .quiz-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .quiz-card.eng:hover  { border-color: var(--accent);  box-shadow: 0 8px 24px rgba(0,255,204,0.15); }
  .quiz-card.chem:hover { border-color: var(--accent2); box-shadow: 0 8px 24px rgba(255,68,136,0.15); }

  .card-arrow {
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    transition: transform 0.15s, right 0.15s;
  }
  .quiz-card.eng  .card-arrow { color: var(--accent); }
  .quiz-card.chem .card-arrow { color: var(--accent2); }
  .quiz-card:hover .card-arrow { right: 14px; transform: translateY(-50%) translateX(4px); }

  .card-icon { font-size: 36px; display: block; margin-bottom: 10px; }
  .card-tag {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    letter-spacing: 2px;
    margin-bottom: 8px;
    display: block;
  }
  .quiz-card.eng  .card-tag { color: var(--accent); }
  .quiz-card.chem .card-tag { color: var(--accent2); }

  .card-title-jp {
    font-size: 18px;
    font-weight: 800;
    display: block;
    margin-bottom: 3px;
  }
  .card-title-en {
    font-size: 11px;
    color: var(--text-dim);
    display: block;
    margin-bottom: 8px;
  }
  .card-desc {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.6;
  }

  /* Footer */
  .footer {
    margin-top: 32px;
    text-align: center;
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    color: var(--text-dim);
    letter-spacing: 1px;
    line-height: 2;
  }
</style>
</head>
<body>
<div class="container">

  <div class="title-block">
    <span class="title-icon">🎮</span>
    <div class="title-main">STUDY PORTAL</div>
    <div class="title-sub">SELECT YOUR QUEST</div>
  </div>

  <div class="select-label">⚔️ CHOOSE A SUBJECT ⚔️</div>

  <a class="quiz-card eng" href="eng-quiz.html">
    <span class="card-icon">📖</span>
    <span class="card-tag">ENGLISH · 英語</span>
    <span class="card-title-jp">英語クイズ</span>
    <span class="card-title-en">Eiken Grade 3</span>
    <span class="card-desc">5 reading passages · 25 questions</span>
    <span class="card-arrow">▶</span>
  </a>

  <a class="quiz-card chem" href="chem-battle.html">
    <span class="card-icon">⚗️</span>
    <span class="card-tag">CHEMISTRY · 化学</span>
    <span class="card-title-jp">化学バトル！</span>
    <span class="card-title-en">Element Symbols &amp; Chemical Formulas</span>
    <span class="card-desc">26 elements · 40 formulas · Boss mode</span>
    <span class="card-arrow">▶</span>
  </a>

  <div class="footer">
    PRESS START TO STUDY<br>
    がんばれ！💪
  </div>

</div>
</body>
</html>
